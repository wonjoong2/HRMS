<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HRMS</title>
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" th:href="@{https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback}">
    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/fontawesome-free/css/all.min.css}">
    <!-- jsGrid -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid.min.css}">
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid-theme.min.css}">
    <!-- Theme style -->
    <link rel="stylesheet" th:href="@{../../adminLte/dist/css/adminlte.min.css}">
    <!--  대화창 style-->
    <link rel="stylesheet" th:href="@{../../css/chat.css}">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a href="/logout" class="nav-link">로그아웃</a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar Container -->
    <div th:replace="~{common/header :: sidebar}"></div>

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">
        <!-- Content Header (Page header) -->
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>조직관리</h1>
                    </div>
                    <div class="col-sm-6">

                    </div>
                </div>
            </div><!-- /.container-fluid -->
        </section>

        <!-- Main content -->
        <section class="content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">부서별채팅</h3>
                </div>

                <!-- /.card-header -->
                <div class="card-body">
                    <div class="chat_wrap">
                        <div class="inner" id="chatArea">

                            <!-- Redis 채팅 기록 -->
                            <div th:each="msg : ${chatHistory}" class="item on">
                                <div class="box">
                                    <p class="msg" th:text="${msg.sender + ':' + msg.content}"></p>
                                    <span class="time"
                                          th:text="${#temporals.format(msg.createdDt,'HH:mm')}"></span>
                                </div>
                            </div>
                        </div>

                        <input type="text" id="messageInput" class="mymsg" placeholder="내용 입력">
                    </div>
                </div>
                <!-- /.card-body -->
            </div>
            <!-- /.card -->
        </section>
        <!-- /.content -->
    </div>
    <!-- /.content-wrapper -->

    <!-- Control Sidebar -->
    <aside class="control-sidebar control-sidebar-dark">
        <!-- Control sidebar content goes here -->
    </aside>
    <!-- /.control-sidebar -->
</div>
<!-- ./wrapper -->

<!-- jQuery -->
<script th:src="@{/adminLte/plugins/jquery/jquery.min.js}"></script>
<!-- Bootstrap 4 -->
<script th:src="@{/adminLte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<!-- jsGrid -->
<script th:src="@{/adminLte/plugins/jsgrid/jsgrid.min.js}"></script>
<!-- AdminLTE App -->
<script th:src="@{/adminLte/dist/js/adminlte.min.js}"></script>
<!-- AdminLTE for demo purposes -->
<script th:src="@{/adminLte/dist/js/demo.js}"></script>
<!-- Page specific script -->
<script th:inline="javascript">
    let deptId = [[${deptId}]];
    let name = [[${name}]];

    let socket = new SockJS('/ws');
    let stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {

        stompClient.subscribe('/sub/chat/' + deptId, function (message) {

            let msg = JSON.parse(message.body);

            let chatArea = document.getElementById("chatArea");

            let myMsg = msg.sender === name ? "mymsg" : "";

            let html =
                '<div class="item '+myMsg+'">' +
                '<div class="box">' +
                '<p class="msg">'+msg.content+'</p>' +
                '<span class="time">'+currentTime()+'</span>' +
                '</div>' +
                '</div>';

            chatArea.innerHTML += html;

            let lastItem = chatArea.lastElementChild;

            setTimeout(function(){
                lastItem.classList.add("on");
            },10);

            chatArea.scrollTop = chatArea.scrollHeight;
        });
    });

    document.getElementById("messageInput")
        .addEventListener("keypress", function(e) {

            if(e.key === "Enter") {
                sendMessage();
            }

        });

    function sendMessage() {

        console.log(deptId)
        console.log(name)

        let content = document.getElementById("messageInput").value;

        if(content.trim() === "") return;

        stompClient.send(
            "/pub/chat/" + deptId,
            {},
            JSON.stringify({
                deptId: deptId,
                sender: name,
                content: content
            })
        );

        document.getElementById("messageInput").value = "";
    }

    function currentTime(){

        let date = new Date();
        let hh = date.getHours();
        let mm = date.getMinutes();

        let apm = hh >= 12 ? "오후" : "오전";
        hh = hh % 12 || 12;

        if(mm < 10){
            mm = "0" + mm;
        }

        return apm + " " + hh + ":" + mm;
    }
</script>
</body>
</html>

<script>

</script>
