<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdminLTE 3 | jsGrid</title>
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" th:href="@{https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback}">
    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/fontawesome-free/css/all.min.css}">
    <!-- jsGrid -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid.min.css}">
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid-theme.min.css}">
    <!-- Theme style -->
    <link rel="stylesheet" th:href="@{../../adminLte/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a href="/logout" class="nav-link">로그아웃</a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar Container -->
    <div th:replace="~{common/header :: sidebar}"></div>

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">
        <!-- Content Header (Page header) -->
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>근태관리</h1>
                    </div>
                    <div class="col-sm-6">

                    </div>
                </div>
            </div><!-- /.container-fluid -->
        </section>

        <!-- Main content -->
        <section class="content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">근태현황조회</h3>
                </div>
                <!-- /.card-header -->
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <input type="text" id="searchName" class="form-control" placeholder="이름">
                        </div>
                        <div class="col-md-3">
                            <input type="date" id="searchWorkDate" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <button id="btnSearch" class="btn btn-primary">검색</button>
                        </div>
                        <div class="col-md-2">
                            <button id="aiSearch" class="btn btn-primary">AI 근태분석</button>
                        </div>
                    </div>
                    <div id="jsGrid1"></div>
                </div>
                <!-- /.card-body -->
            </div>
            <!-- /.card -->
        </section>
        <!-- /.content -->
    </div>

    <!-- Control Sidebar -->
    <aside class="control-sidebar control-sidebar-dark">
        <!-- Control sidebar content goes here -->
    </aside>
    <!-- /.control-sidebar -->
</div>
<!-- ./wrapper -->

<!-- jQuery -->
<script th:src="@{/adminLte/plugins/jquery/jquery.min.js}"></script>
<!-- Bootstrap 4 -->
<script th:src="@{/adminLte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<!-- jsGrid -->
<!--<script th:src="@{../../adminLte/plugins/jsgrid/demos/db.js}"></script>-->
<script th:src="@{/adminLte/plugins/jsgrid/jsgrid.min.js}"></script>
<!-- AdminLTE App -->
<script th:src="@{/adminLte/dist/js/adminlte.min.js}"></script>
<!-- AdminLTE for demo purposes -->
<script th:src="@{/adminLte/dist/js/demo.js}"></script>
<!-- Page specific script -->
<script>
    $(function () {
        $("#btnSearch").on("click", function() {
            $("#jsGrid1").jsGrid("loadData");
        });

        $("#jsGrid1").jsGrid({
            width: "100%",
            height: "500px",

            // inserting: true,
            // editing: true,
            sorting: true,
            paging: true,
            autoload: true,

            pageSize: 10,

            controller: {
                loadData: function() {
                    return $.ajax({
                        type: "GET",
                        url: "/attendance/list",
                        data: {
                            name: $("#searchName").val(),
                            workDate: $("#searchWorkDate").val()
                        }
                    });
                },
                // insertItem: function(item) {
                //     return $.ajax({
                //         type: "POST",
                //         url: "/dept/register",
                //         data: JSON.stringify(item),
                //         contentType: "application/json"
                //     });
                // },
                // updateItem: function(item) {
                //     return $.ajax({
                //         type: "PUT",
                //         url: "/api/employees/" + item.id,
                //         data: JSON.stringify(item),
                //         contentType: "application/json"
                //     });
                // },
                // deleteItem: function(item) {
                //     return $.ajax({
                //         type: "DELETE",
                //         url: "/api/employees/" + item.id
                //     });
                // }
            },
            fields: [
                { name: "user.name", title:"이름", type: "text", width: 150},
                { name: "work_date", title:"근무일", type: "text", width: 150},
                { name: "check_in_time", title:"출근", type: "text", width: 100 },
                { name: "check_out_time", title:"퇴근", type: "text", width: 100 },
                { name: "work_minutes", title:"근무시간", type: "text", width: 100 },
                { name: "overtime_minutes", title:"연장근무", type: "text", width: 100 },
                { name: "late_minutes", title:"지각시간", type: "text", width: 100 },
                { name: "early_leave_minutes", title:"조퇴시간", type: "text", width: 100 },
                { name: "attendance_status", title:"상태", type: "text", width: 100 },
                // { type: "control" }
            ]
        });

        $("#aiSearch").on("click", function() {
            window.open("/attendance/ai/pop","AI 근태분석","width=800,height=600")
        });

    });
</script>
</body>
</html>
