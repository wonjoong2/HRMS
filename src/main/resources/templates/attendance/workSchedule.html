<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AdminLTE 3 | jsGrid</title>
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" th:href="@{https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback}">
    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/fontawesome-free/css/all.min.css}">
    <!-- jsGrid -->
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid.min.css}">
    <link rel="stylesheet" th:href="@{../../adminLte/plugins/jsgrid/jsgrid-theme.min.css}">
    <!-- Theme style -->
    <link rel="stylesheet" th:href="@{../../adminLte/dist/css/adminlte.min.css}">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a href="/logout" class="nav-link">로그아웃</a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar Container -->
    <div th:replace="~{/common/header :: sidebar}"></div>

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">
        <!-- Content Header (Page header) -->
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>근태관리</h1>
                    </div>
                    <div class="col-sm-6">
                    </div>
                </div>
            </div><!-- /.container-fluid -->
        </section>

        <div class="modal fade" id="deptModal">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">

                    <div class="modal-header">
                        <h4 class="modal-title">부서 선택</h4>
                        <button type="button" class="close" data-dismiss="modal">
                            <span>&times;</span>
                        </button>
                    </div>

                    <div class="modal-body">
                        <div class="row mb-3">
                            <div class="col-md-3">
                                <input type="text" id="searchDeptName" class="form-control" placeholder="부서명">
                            </div>
                            <div class="col-md-3">
                                <input type="text" id="searchDeptId" class="form-control" placeholder="부서코드">
                            </div>
                            <div class="col-md-2">
                                <button id="btnDeptSearch" class="btn btn-primary">검색</button>
                            </div>
                        </div>
                        <div id="deptGrid"></div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">
                            닫기
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Main content -->
        <section class="content">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">기준근무시간 등록(부서별)</h3>
                </div>
                <!-- /.card-header -->
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-3">
                            <input type="text" id="searchName" class="form-control" placeholder="부서명">
                        </div>
                        <div class="col-md-2">
                            <button id="btnSearch" class="btn btn-primary">검색</button>
                        </div>
                    </div>
                    <div id="jsGrid1"></div>
                </div>
                <!-- /.card-body -->
            </div>
            <!-- /.card -->
        </section>
        <!-- /.content -->
    </div>

    <!-- Control Sidebar -->
    <aside class="control-sidebar control-sidebar-dark">
        <!-- Control sidebar content goes here -->
    </aside>
    <!-- /.control-sidebar -->
</div>
<!-- ./wrapper -->

<!-- jQuery -->
<script th:src="@{/adminLte/plugins/jquery/jquery.min.js}"></script>
<!-- Bootstrap 4 -->
<script th:src="@{/adminLte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<!-- jsGrid -->
<!--<script th:src="@{../../adminLte/plugins/jsgrid/demos/db.js}"></script>-->
<script th:src="@{/adminLte/plugins/jsgrid/jsgrid.min.js}"></script>
<!-- AdminLTE App -->
<script th:src="@{/adminLte/dist/js/adminlte.min.js}"></script>
<!-- AdminLTE for demo purposes -->
<script th:src="@{/adminLte/dist/js/demo.js}"></script>
<!-- Page specific script -->
<script>
    $(function () {
        $("#btnSearch").on("click", function() {
            $("#jsGrid1").jsGrid("loadData");
        });

        $("#jsGrid1").jsGrid({
            width: "100%",
            height: "500px",

            inserting: true,
            editing: true,
            sorting: true,
            paging: true,
            autoload: true,

            pageSize: 10,

            controller: {
                loadData: function() {
                    return $.ajax({
                        type: "GET",
                        url: "/workSchedule/list",
                        data: {
                            name: $("#searchName").val(),
                        }
                    });
                },
                insertItem: function(item) {
                    return $.ajax({
                        type: "POST",
                        url: "/workSchedule/register",
                        data: JSON.stringify(item),
                        contentType: "application/json"
                    });
                },
                updateItem: function(item) {
                    return $.ajax({
                        type: "PUT",
                        url: "/workSchedule/update/" + item.id,
                        data: JSON.stringify(item),
                        contentType: "application/json"
                    });
                },
                deleteItem: function(item) {
                    return $.ajax({
                        type: "DELETE",
                        url: "/workSchedule/delete/" + item.id
                    });
                }
            },
            fields: [
                {
                    name: "deptName",
                    title: "부서명",
                    type: "text",
                    insertTemplate: function() {

                        this._insertInput = $("<input>")
                            .addClass("form-control")
                            .attr("readonly", true)
                            .click(function() {
                                $("#deptModal").modal("show");
                            });

                        return this._insertInput;
                    },
                    editTemplate: function(value) {

                        this._editInput = $("<input>")
                            .addClass("form-control")
                            .attr("readonly", true)
                            .val(value)
                            .click(function() {
                                $("#deptModal").modal("show");
                            });

                        return this._editInput;
                    },

                    insertValue: function() {
                        return this._insertInput.val();
                    },

                    editValue: function() {
                        return this._editInput.val();
                    }
                },
                {
                    name: "deptId",
                    title: "부서코드",
                    type: "text",

                    insertTemplate: function() {
                        this._insertDeptInput = $("<input>")
                            .addClass("form-control")
                            .attr("readonly", true);
                        return this._insertDeptInput;
                    },

                    editTemplate: function(value) {
                        this._editDeptInput = $("<input>")
                            .addClass("form-control")
                            .attr("readonly", true)
                            .val(value);
                        return this._editDeptInput;
                    },

                    insertValue: function() {
                        return this._insertDeptInput.val();
                    },

                    editValue: function() {
                        return this._editDeptInput.val();
                    }
                },
                {
                    name: "startTime",
                    title: "시작시간",
                    type: "text",
                    insertTemplate: function () {
                        return this._insertInput = $("<input>")
                            .attr("type", "time")
                            .addClass("form-control");
                    },
                    editTemplate: function (value) {
                        return this._editInput = $("<input>")
                            .attr("type", "time")
                            .addClass("form-control")
                            .val(value);
                    },
                    insertValue: function () {
                        return this._insertInput.val();
                    },
                    editValue: function () {
                        return this._editInput.val();
                    }
                },
                {
                    name: "endTime",
                    title: "종료시간",
                    type: "text",
                    insertTemplate: function () {
                        return this._insertInput = $("<input>")
                            .attr("type", "time")
                            .addClass("form-control");
                    },
                    editTemplate: function (value) {
                        return this._editInput = $("<input>")
                            .attr("type", "time")
                            .addClass("form-control")
                            .val(value);
                    },
                    insertValue: function () {
                        return this._insertInput.val();
                    },
                    editValue: function () {
                        return this._editInput.val();
                    }
                },
                { name: "breakMinutes", title:"휴식시간(분)", type: "text", width: 150 },
                { type: "control" }
            ]
        });

        $("#deptModal").on("shown.bs.modal", function () {

            if ($("#deptGrid").data("JSGrid")) return; // 중복 생성 방지

            $("#deptGrid").jsGrid({
                width: "100%",
                height: "300px",

                sorting: true,
                paging: true,
                autoload: true,

                controller: {
                    loadData: function() {
                        return $.ajax({
                            type: "GET",
                            url: "/dept/list",
                            data: {
                                searchDeptName: $("#searchDeptName").val(),
                                searchDeptId: $("#searchDeptId").val()
                            },
                        });
                    }
                },

                rowClick: function(args) {

                    let dept = args.item;

                    let grid = $("#jsGrid1").data("JSGrid");

                    let deptIdField = grid.fields.find(f => f.name === "deptId");
                    let deptNameField = grid.fields.find(f => f.name === "deptName");

                    if (deptNameField._editInput) {
                        deptNameField._editInput.val(dept.deptName);
                        deptIdField._editDeptInput.val(dept.deptId);
                    }
                    else if (deptNameField._insertInput) {
                        deptNameField._insertInput.val(dept.deptName);
                        deptIdField._insertDeptInput.val(dept.deptId);
                    }

                    $("#deptModal").modal("hide");
                },

                fields: [
                    { name: "deptName", title: "부서명", type: "text" },
                    { name: "deptId", title: "부서코드", type: "text" },
                ]
            });

        });
    });
</script>
</body>
</html>
