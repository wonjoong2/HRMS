    <!-- 비밀번호 찾기 모달 -->
    <div class="modal fade" id="passwordModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h4 class="modal-title">비밀번호 재설정</h4>
                    <button type="button" class="close" data-dismiss="modal">

                    </button>
                </div>

                <div class="modal-body">

                </div>

                <div class="modal-footer">
                    <button id="btnResetPassword" class="btn btn-primary">임시 비밀번호 발송</button>
                    <button class="btn btn-secondary" data-dismiss="modal">닫기</button>
                </div>

            </div>

    <!-- jQuery -->
    <script th:src="@{/adminLte/plugins/jquery/jquery.min.js}"></script>
    <!-- Bootstrap 4 -->
    <script th:src="@{/adminLte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <!-- jsGrid -->
    <!--<script th:src="@{../../adminLte/plugins/jsgrid/demos/db.js}"></script>-->
    <script th:src="@{/adminLte/plugins/jsgrid/jsgrid.min.js}"></script>
    <!-- AdminLTE App -->
    <script th:src="@{/adminLte/dist/js/adminlte.min.js}"></script>
    <!-- AdminLTE for demo purposes -->
    <script th:src="@{/adminLte/dist/js/demo.js}"></script>
    <!-- Page specific script -->
    <script>
        $(function () {
            $("#jsGrid1").jsGrid({
                width: "100%",
                height: "500px",

                inserting: true,
                editing: true,
                sorting: true,
                paging: true,
                autoload: true,

                pageSize: 10,

                controller: {
                    loadData: function() {
                        return $.ajax({
                            type: "GET",
                            url: "/user/list",
                            data: {
                                name: $("#searchName").val(),
                                email: $("#searchEmail").val(),
                                status: $("#searchStatus").val()
                            },
                        });
                    },
                    insertItem: function(item) {
                        return $.ajax({
                            type: "POST",
                            url: "/user/register",
                            data: JSON.stringify(item),
                            contentType: "application/json"
                        });
                    },
                    updateItem: function(item) {
                        return $.ajax({
                            type: "PUT",
                            url: "/user/update/" + item.id,
                            data: JSON.stringify(item),
                            contentType: "application/json"
                        });
                    },
                    deleteItem: function(item) {
                        return $.ajax({
                            type: "DELETE",
                            url: "/user/delete/" + item.id
                        });
                    }
                },

                fields: [
                    { name: "name", title:"이름", type: "text", width: 100, validate: "required"},
                    {
                        name: "dept_name",
                        title: "부서명",
                        type: "text",
                        insertTemplate: function() {

                            this._insertInput = $("<input>")
                                .addClass("form-control")
                                .attr("readonly", true)
                                .click(function() {
                                    $("#deptModal").modal("show");
                                });

                            return this._insertInput;
                        },
                        editTemplate: function(value) {

                            this._editInput = $("<input>")
                                .addClass("form-control")
                                .attr("readonly", true)
                                .val(value)
                                .click(function() {
                                    $("#deptModal").modal("show");
                                });

                            return this._editInput;
                        },

                        insertValue: function() {
                            return this._insertInput.val();
                        },

                        editValue: function() {
                            return this._editInput.val();
                        }
                    },
                    {
                        name: "dept_id",
                        title: "부서코드",
                        type: "text",

                        insertTemplate: function() {
                            this._insertDeptInput = $("<input>")
                                .addClass("form-control")
                                .attr("readonly", true);
                            return this._insertDeptInput;
                        },

                        editTemplate: function(value) {
                            this._editDeptInput = $("<input>")
                                .addClass("form-control")
                                .attr("readonly", true)
                                .val(value);
                            return this._editDeptInput;
                        },

                        insertValue: function() {
                            return this._insertDeptInput.val();
                        },

                        editValue: function() {
                            return this._editDeptInput.val();
                        }
                    },
                    { name: "email", title:"이메일", type: "text", width: 150 },
                    {
                        name: "password",
                        title: "비밀번호",
                        type: "password",
                        width: 150,

                        itemTemplate: function(value) {
                            if (!value) return "";
                            return "********";
                        },

                        insertTemplate: function() {
                            return this._insertInput = $("<input>").attr("type", "password");
                        },

                        editTemplate: function(value) {
                            return this._editInput = $("<input>")
                                .attr("type", "password")
                                .attr("readonly", true)
                                .val(value);
                        },

                        insertValue: function() {
                            return this._insertInput.val();
                        },

                        editValue: function() {
                            return this._editInput.val();
                        }
                    },
                    // { name: "role", type: "text", width: 150 },
                    {
                        name: "hire_date",
                        title: "입사일",
                        type: "text",
                        insertTemplate: function() {
                            return this._insertPicker = $("<input>").attr("type", "date");
                        },
                        editTemplate: function(value) {
                            return this._editPicker = $("<input>")
                                .attr("type", "date")
                                .val(value ? value.substring(0, 10) : "");
                        },
                        insertValue: function() {
                            return this._insertPicker.val();
                        },
                        editValue: function() {
                            return this._editPicker.val();
                        }
                    },
                    {
                        name: "status",
                        title: "재직구분",
                        type: "select",
                        items: [
                            { text: "재직", value: "재직" },
                            { text: "퇴사", value: "퇴사" },
                            { text: "휴직", value: "휴직" }
                        ],
                        valueField: "value",
                        textField: "text",
                        width: 100
                    },
                    { type: "control" }
                ]
            });
            $("#btnSearch").on("click", function () {
                $("#jsGrid1").jsGrid("loadData");
            });
            // 부서 선택 모달 그리드
            $("#deptModal").on("shown.bs.modal", function () {

                if ($("#deptGrid").data("JSGrid")) return; // 중복 생성 방지

                $("#deptGrid").jsGrid({
                    width: "100%",
                    height: "300px",

                    sorting: true,
                    paging: true,
                    autoload: true,

                    controller: {
                        loadData: function() {
                            return $.ajax({
                                type: "GET",
                                url: "/dept/list",
                                data: {
                                    searchDeptName: $("#searchDeptName").val(),
                                    searchDeptId: $("#searchDeptId").val()
                                },
                            });
                        }
                    },
                    rowClick: function(args) {

                        let dept = args.item;

                        let grid = $("#jsGrid1").data("JSGrid");

                        let deptIdField = grid.fields.find(f => f.name === "dept_id");
                        let deptNameField = grid.fields.find(f => f.name === "dept_name");

                        if (deptNameField._editInput) {
                            deptNameField._editInput.val(dept.deptName);
                            deptIdField._editDeptInput.val(dept.deptId);
                        }
                        else if (deptNameField._insertInput) {
                            deptNameField._insertInput.val(dept.deptName);
                            deptIdField._insertDeptInput.val(dept.deptId);
                        }

                        $("#deptModal").modal("hide");
                    },

                    fields: [
                        { name: "deptName", title: "부서명", type: "text" },
                        { name: "deptId", title: "부서코드", type: "text" },
                    ]
                });

            });
            $("#btnDeptSearch").on("click", function () {
                $("#deptGrid").jsGrid("loadData");
            });
        });
    </script>
