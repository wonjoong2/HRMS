<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AdminLTE 3 | Dashboard 3</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" th:href="@{https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback}">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" th:href="@{/adminLte/plugins/fontawesome-free/css/all.min.css}">
  <!-- IonIcons -->
  <link rel="stylesheet" th:href="@{https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css}">
  <!-- Theme style -->
  <link rel="stylesheet" th:href="@{/adminLte/dist/css/adminlte.min.css}">
</head>
<!--
`body` tag options:

  Apply one or more of the following classes to to the body tag
  to get the desired effect

  * sidebar-collapse
  * sidebar-mini
-->
<body class="hold-transition sidebar-mini">
<div class="wrapper">
  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <!-- Left navbar links -->
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>

    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a href="/logout" class="nav-link">로그아웃</a>
      </li>
    </ul>
  </nav>
  <!-- /.navbar -->

  <!-- Main Sidebar Container -->

  <div th:replace="~{common/header :: sidebar}"></div>

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper">
    <!-- Content Header (Page header) -->
    <div class="content-header">
      <div class="container-fluid">

        <div class="row">

          <div class="col-lg-3 col-6">
            <div class="small-box bg-info">
              <div class="inner">
                <h3 th:text="${totalUser}">0</h3>
                <p>총 직원 수</p>
              </div>
              <div class="icon">
                <i class="fas fa-users"></i>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-success">
              <div class="inner">
                <h3 th:text="${attendCount}">0</h3>
                <p>출근</p>
              </div>
              <div class="icon">
                <i class="fas fa-check"></i>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-warning">
              <div class="inner">
                <h3 th:text="${lateCount}">0</h3>
                <p>지각</p>
              </div>
              <div class="icon">
                <i class="fas fa-clock"></i>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-danger">
              <div class="inner">
                <h3 th:text="${absentCount}">0</h3>
                <p>결근</p>
              </div>
              <div class="icon">
                <i class="fas fa-times"></i>
              </div>
            </div>
          </div>

        </div>

        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0">근태관리 대시보드</h1>
          </div><!-- /.col -->
          <div class="col-sm-6">

          </div><!-- /.col -->
        </div><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <!-- /.content-header -->

    <!-- Main content -->
    <div class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-6">
            <div class="card">
              <div class="card-header border-0">
                <div class="d-flex justify-content-between">
                  <h3 class="card-title">월별 근태 통계</h3>
                </div>
              </div>
              <div class="card-body">

                <div class="position-relative mb-4">
                  <canvas id="visitors-chart" height="200"></canvas>
                </div>
              </div>
            </div>
          </div>
          <!-- /.col-md-6 -->
          <div class="col-lg-6">
            <div class="card">
              <div class="card-header border-0">
                <div class="d-flex justify-content-between">
                  <h3 class="card-title">부서별 지각률</h3>
                </div>
              </div>
              <div class="card-body">
                <!-- /.d-flex -->

                <div class="position-relative mb-4">
                  <canvas id="sales-chart" height="200"></canvas>
                </div>
              </div>
            </div>
          </div>
          <!-- /.col-md-6 -->
        </div>
        <!-- /.row -->
      </div>
      <!-- /.container-fluid -->
    </div>
    <!-- /.content -->
  </div>
  <!-- /.content-wrapper -->

  <!-- Main Footer -->

</div>

<!-- jQuery -->
<script th:src="@{/adminLte/plugins/jquery/jquery.min.js}"></script>
<!-- Bootstrap -->
<script th:src="@{/adminLte/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
<!-- AdminLTE -->
<script th:src="@{/adminLte/dist/js/adminlte.js}"></script>

<!-- OPTIONAL SCRIPTS -->
<script th:src="@{/adminLte/plugins/chart.js/Chart.min.js}"></script>
<!-- AdminLTE for demo purposes -->
<!--<script th:src="@{/adminLte/dist/js/demo.js}"></script>-->
<!-- AdminLTE dashboard demo (This is only for demo purposes) -->
<!--<script th:src="@{/adminLte/dist/js/pages/dashboard3.js}"></script>-->
</body>
</html>


<script>
  $(function(){

    $.get("/api/dashboard/monthly-attendance", function(data){

      let labels = []
      let values = []

      data.forEach(function(row){

        labels.push(row[0] + "월")
        values.push(row[1])

      })

      const ctx = document.getElementById("visitors-chart")

      new Chart(ctx, {

        type: 'line',

        data: {

          labels: labels,

          datasets: [{
            label: '월별 출근 기록 수',
            data: values,
            borderColor: '#007bff',
            fill: false
          }]

        }

      })

    })

    $.get("/api/dashboard/dept-late-rate", function(data){

      let labels = []
      let values = []

      data.forEach(function(row){

        labels.push(row[0])
        values.push(row[1].toFixed(1))

      })

      const ctx = document.getElementById("sales-chart")

      new Chart(ctx, {

        type: 'bar',

        data: {
          labels: labels,

          datasets: [{
            label: '부서별 지각률 (%)',
            data: values,
            backgroundColor: '#ffc107'
          }]
        }

      })

    })

  })
</script>
